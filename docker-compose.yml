services:
  coincoach:
    build:
      context: .
      dockerfile: Dockerfile
    image: coincoach:latest
    container_name: coincoach
    restart: unless-stopped
    # Host port 4600 is this project's external port (range 4600-4610 reserved
    # for CoinCoach); the container keeps 3000 internally.
    ports:
      - '4600:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      # - BUTTONDOWN_API_KEY=${BUTTONDOWN_API_KEY}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits apply with Docker Compose v2+ (and under Swarm).
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    # Place behind a reverse proxy (Caddy/nginx) terminating TLS for coincoach.ca,
    # proxying to host port 4600.
